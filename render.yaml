services:
  - type: web
    name: codemind-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://codemind-ai-frontend.onrender.com
      - key: CORS_ORIGIN_REGEX
        value: ^https://.*\.onrender\.com$

  - type: static
    name: codemind-ai-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://codemind-ai-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
